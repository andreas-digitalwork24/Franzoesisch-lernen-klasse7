<!DOCTYPE html>

    <nav><a href="index.html">← Zurück</a></nav>
    <main>
        <h2>Karteikarten: Grundwortschatz</h2>
        <div id="flashcard-app">
            <div class="flashcard-wrapper" onclick="flipCard()" role="button" aria-label="Karteikarte umdrehen" tabindex="0">

                    <div class="flashcard-face flashcard-back" id="back-text">Rückseite</div>
                </div>
            </div>
            <div class="controls">
                <button onclick="prevCard()">Vorherige</button>
                <button onclick="markAsLearned()" id="learn-btn">Als gelernt markieren</button>
                <button onclick="nextCard()">Nächste</button>
            </div>
            <p id="counter" style="text-align: center;"></p>
        </div>
    </main>

            { f: "wohnen", b: "habiter" },
            { f: "arbeiten / lernen", b: "travailler" },
            { f: "mögen / lieben", b: "aimer" },
            { f: "spielen", b: "jouer" },
            { f: "der Sport / der Fußball", b: "le sport / le foot" },
            { f: "das Shopping / das Einkaufen", b: "le shopping" },

            { f: "hübsch", b: "joli(e)" },

        let currentIndex = 0;

        function updateCard() {
            const card = cards[currentIndex];
            document.getElementById('front-text').innerText = card.f;
            document.getElementById('back-text').innerText = card.b;
            document.getElementById('card').classList.remove('is-flipped');
            document.getElementById('counter').innerText = `Karte ${currentIndex + 1} von ${cards.length}`;

            // Lade Status aus LocalStorage
            const learnedData = JSON.parse(localStorage.getItem('learnedCards') || '[]');
            const isLearned = learnedData.includes(card.f);
            document.getElementById('learn-btn').innerText = isLearned ? "Gelernt! (Entfernen)" : "Als gelernt markieren";
        }

        function flipCard() {
            document.getElementById('card').classList.toggle('is-flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % cards.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + cards.length) % cards.length;
            updateCard();
        }

        function markAsLearned() {
            let learnedData = JSON.parse(localStorage.getItem('learnedCards') || '[]');
            const cardFront = cards[currentIndex].f;

            if (learnedData.includes(cardFront)) {
                learnedData = learnedData.filter(item => item !== cardFront);
            } else {
                learnedData.push(cardFront);
            }

            localStorage.setItem('learnedCards', JSON.stringify(learnedData));
            updateCard();
        }

        updateCard();
    </script>
</body>
</html>
